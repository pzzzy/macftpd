<div class="flex flex-wrap items-center justify-between gap-3">
  <div>
    <p class="mac-section-title">Recovery</p>
    <h2 class="mt-1 text-lg font-semibold">Trash and Versions</h2>
  </div>
  <div class="join">
    <button class="btn btn-sm join-item {{if eq .Kind "trash"}}btn-primary{{end}}" hx-get="/admin/partials/retention?kind=trash" hx-target="#retention-panel" hx-swap="innerHTML">Trash</button>
    <button class="btn btn-sm join-item {{if eq .Kind "versions"}}btn-primary{{end}}" hx-get="/admin/partials/retention?kind=versions" hx-target="#retention-panel" hx-swap="innerHTML">Versions</button>
  </div>
</div>
{{if .Status}}<div class="alert alert-success mt-3 py-2 text-sm">{{.Status}}</div>{{end}}
{{if .Error}}<div class="alert alert-error mt-3 py-2 text-sm">{{.Error}}</div>{{end}}

<div class="mt-4 overflow-auto rounded-box border border-base-300">
  <table class="table table-sm">
    <thead><tr><th>Original Path</th><th>Size</th><th>Modified</th><th>Restore</th></tr></thead>
    <tbody>
      {{range .Items}}
        <tr>
          <td class="break-all font-mono text-xs">{{.OriginalPath}}</td>
          <td class="font-mono text-xs">{{humanSize .Size .IsDir}}</td>
          <td class="font-mono text-xs">{{formatDate .ModTime}}</td>
          <td>
            <form class="flex flex-wrap items-center gap-2"
              hx-post="/admin/partials/retention?kind={{$.Kind}}"
              hx-target="#retention-panel"
              hx-swap="innerHTML">
              <input type="hidden" name="id" value="{{.ID}}">
              <input class="input input-bordered input-xs min-w-44" name="dest_path" placeholder="original path">
              <label class="label cursor-pointer gap-1 p-0 text-xs"><input class="checkbox checkbox-xs" type="checkbox" name="overwrite"> overwrite</label>
              <button class="btn btn-xs">Restore</button>
            </form>
          </td>
        </tr>
      {{else}}
        <tr><td colspan="4" class="py-8 text-center text-base-content/60">Nothing retained.</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
