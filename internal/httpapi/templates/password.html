<!doctype html>
<html lang="en" data-theme="macftpd">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="{{uiAsset "macftpd.css"}}">
</head>
<body>
  <main class="mx-auto max-w-md p-5 pt-[14vh]">
    <form class="mac-panel rounded-box p-6" method="post">
      <h1 class="mb-4 text-xl font-semibold">{{.Title}}</h1>
      <label class="form-control">
        <span class="label-text">Password</span>
        <input class="input input-bordered" type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="btn btn-primary mt-4 w-full">Open</button>
    </form>
  </main>
</body>
</html>
